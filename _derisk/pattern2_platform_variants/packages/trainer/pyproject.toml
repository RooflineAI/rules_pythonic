[project]
name = "trainer"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = ["numpy", "scipy"]

[project.optional-dependencies]
# Conflicting extras: variant_a and variant_b want different urllib3 versions
variant_a = ["urllib3>=2.0"]
variant_b = ["urllib3<2.0"]
# Non-conflicting extra: can be combined with either variant
test = ["pytest"]

[tool.uv]
conflicts = [
    [
        { extra = "variant_a" },
        { extra = "variant_b" },
    ],
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
