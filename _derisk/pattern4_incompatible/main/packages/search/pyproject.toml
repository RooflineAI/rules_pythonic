[project]
name = "search"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "core",
    "pydantic>=2.0",
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.backends"

[tool.hatch.build.targets.wheel]
packages = ["src/search"]

[tool.uv.sources]
core = { workspace = true }
