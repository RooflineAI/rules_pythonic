[project]
name = "api"
version = "0.1.0"
description = "API service"
requires-python = ">=3.11"
dependencies = [
    "core",
    "fastapi",
    "uvicorn",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.backends.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]

[tool.uv.sources]
core = { workspace = true }
