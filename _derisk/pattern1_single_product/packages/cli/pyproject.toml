[project]
name = "cli"
version = "0.1.0"
description = "CLI tool"
requires-python = ">=3.11"
dependencies = [
    "core",
    "click",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.backends.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cli"]

[tool.uv.sources]
core = { workspace = true }
