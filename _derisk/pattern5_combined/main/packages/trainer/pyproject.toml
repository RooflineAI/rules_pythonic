[project]
name = "trainer"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["numpy", "scipy"]

[project.optional-dependencies]
# Conflicting: cpu and cuda12 want different urllib3 versions (proxy for torch)
cpu = ["urllib3>=2.0"]
cuda12 = ["urllib3>=2.0", "colorama"]

[tool.uv]
conflicts = [
    [
        { extra = "cpu" },
        { extra = "cuda12" },
    ],
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trainer"]
